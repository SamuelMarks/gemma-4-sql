name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run lint and format
        run: |
          ruff check .
          ruff format --check .
      - name: Run mypy
        run: |
          mypy src/gemma_4_sql
      - name: Run tests
        run: |
          pytest --cov=src/gemma_4_sql --cov-report=xml --cov-report=term tests/
